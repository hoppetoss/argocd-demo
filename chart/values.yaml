replicaCount: 2

serviceAccount:
  create: false
  automount: false
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}
volumes: []
volumeMounts: []

image:
  repository: demo-app
  pullPolicy: IfNotPresent
  tag: "0.1.0"

service:
  type: ClusterIP
  port: 5000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 5000
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 5000
  periodSeconds: 5

serviceMonitor:
  enabled: false  # We'll enable when we install Prometheus Operator later
  interval: 15s
  path: /metrics
